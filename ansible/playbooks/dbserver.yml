---
################################################################################
# Zoolandia Database Server Setup
# File: playbooks/dbserver.yml
# Purpose: Install and configure database servers
#
# USAGE:
#   ansible-playbook playbooks/dbserver.yml
#   ansible-playbook playbooks/dbserver.yml --tags "postgresql,redis"
#   ansible-playbook playbooks/dbserver.yml -e "db_admin_password=SecurePass123"
#   ansible-playbook playbooks/dbserver.yml --check
#
################################################################################

- name: Database Server Installation
  hosts: localhost
  connection: local
  become: yes

  vars:
    # Failure tracking
    dbserver_failures: []

    # Password management (generated by Zoolandia menu)
    # Can be overridden via -e flag
    db_admin_password: "{{ db_admin_password | default('') }}"
    postgres_password: "{{ postgres_password | default('') }}"
    mysql_root_password: "{{ mysql_root_password | default('') }}"
    redis_password: "{{ redis_password | default('') }}"
    mongodb_password: "{{ mongodb_password | default('') }}"

  roles:
    - role: dbserver
      tags: ['dbserver', 'database']

  post_tasks:
    - name: "✅ DATABASE SERVER ROLE COMPLETE"
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════════════
          ✅ DATABASE SERVER SETUP COMPLETE!
          ═══════════════════════════════════════════════════════════════════

          Installed databases include:
            - Relational: PostgreSQL, MySQL/MariaDB
            - NoSQL: Redis, MongoDB
            - Admin Tools: pgAdmin, Adminer
            - Backup Tools: pgBackRest, wal-g

          {% if dbserver_failures | default([]) | length > 0 %}
          ⚠ FAILURES ({{ dbserver_failures | length }}):
          {% for failure in dbserver_failures %}
            - {{ failure }}
          {% endfor %}
          {% endif %}

          SECURITY NOTES:
            ⚠ Database credentials stored in:
              - ~/.zoolandia/credentials.txt
              - Bitwarden vault (if configured)
              - HashiCorp Vault (if configured)

          NEXT STEPS:
            - Configure database backups
            - Set up replication (if needed)
            - Configure firewall rules
            - Test database connections

          ═══════════════════════════════════════════════════════════════════
      tags: ['always', 'summary']
