---
################################################################################
# Security Role - Default Variables
# Purpose: Configure security tools installation and settings
################################################################################

# Feature flags
install_fail2ban: true
install_clamav: true
install_auditd: true

# Fail2ban configuration
fail2ban:
  enabled: true
  bantime: 3600      # 1 hour ban
  findtime: 600      # 10 minute window
  maxretry: 5        # 5 failures before ban

# ClamAV configuration
clamav:
  enabled: true
  update_definitions: true
  scheduled_scan: false
  scan_schedule: "0 3 * * *"  # Daily at 3am

# Auditd configuration
auditd:
  enabled: true
  log_file: "/var/log/audit/audit.log"
  max_log_file: 50  # MB

# User experience (inherits from parent if not set)
user_experience:
  emoji_success: "✅"
  emoji_failure: "❌"
  emoji_warning: "⚠️"
  emoji_target: "🎯"
  emoji_package: "📦"

# Role version
security_role_version: "1.0.0"
security_role_date: "2026-01-25"
