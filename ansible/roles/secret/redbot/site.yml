---
################################################################################
# Secret Project: Red-DiscordBot (Redbot)
# Purpose: Install Red-DiscordBot and configure all repos/cogs from TL inventory
#
# Usage: Run via Zoolandia Secret Projects menu
#
# Extra vars (optional):
#   redbot_instance=<name>    Bot instance name (default: redbot)
#   redbot_user=<user>        System user to run the bot (default: redbot)
#   redbot_home=<path>        Home/install directory (default: /opt/redbot)
################################################################################

- name: Install Red-DiscordBot with TL cog inventory
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  vars:
    redbot_instance:  "redbot"
    redbot_user:      "redbot"
    redbot_home:      "/opt/redbot"
    redbot_venv:      "/opt/redbot/venv"
    redbot_data:      "/opt/redbot/data"

    redbot_repos:
      - { name: "Trusty-cogs",    url: "https://github.com/TrustyJAID/Trusty-cogs"          }
      - { name: "Toxic-Cogs",     url: "https://github.com/NeuroAssassin/Toxic-Cogs"         }
      - { name: "FlameCogs",      url: "https://github.com/Flame442/FlameCogs"               }
      - { name: "Laggrons-Cogs",  url: "https://github.com/retke/Laggrons-Dumb-Cogs"         }
      - { name: "Dav-Cogs",       url: "https://github.com/Dav-Git/Dav-Cogs"                 }
      - { name: "tl",             url: "https://github.com/dgarner-cg/tl-cogs"               }
      - { name: "PCXCogs",        url: "https://github.com/PhasecoreX/PCXCogs"               }
      - { name: "flare-cogs",     url: "https://github.com/flaree/Flare-Cogs"                }
      - { name: "aikaterna-cogs", url: "https://github.com/aikaterna/aikaterna-cogs"         }
      - { name: "brandons209",    url: "https://github.com/brandons209/Red-bot-Cogs"         }
      - { name: "Fixator10-Cogs", url: "https://github.com/fixator10/Fixator10-Cogs"         }
      - { name: "adventurerepo",  url: "https://github.com/aikaterna/gobcog"                 }
      - { name: "SauriCogs",      url: "https://github.com/elijabesu/SauriCogs"              }
      - { name: "jumperplugins",  url: "https://github.com/Redjumpman/Jumper-Plugins"        }
      - { name: "legendv3",       url: "https://github.com/Legend-Gaming/legendv3-cogs"      }
      - { name: "Kennyshiwas",    url: "https://github.com/kennnyshiwa/kennnyshiwa-cogs"     }

    # status: loaded = was active in the server; unloaded = historical/optional
    redbot_cogs:
      # ── LOADED (active cogs) ────────────────────────────────────────────────
      - { repo: "Trusty-cogs",    cog: "activitylog",        status: "loaded"   }
      - { repo: "Toxic-Cogs",     cog: "antispam",           status: "loaded"   }
      - { repo: "FlameCogs",      cog: "cooldown",           status: "loaded"   }
      - { repo: "Laggrons-Cogs",  cog: "editor",             status: "loaded"   }
      - { repo: "Dav-Cogs",       cog: "embedmaker",         status: "loaded"   }
      - { repo: "tl",             cog: "exporttree",         status: "loaded"   }
      - { repo: "Trusty-cogs",    cog: "extendedmodlog",     status: "loaded"   }
      - { repo: "PCXCogs",        cog: "infochannel",        status: "loaded"   }
      - { repo: "flare-cogs",     cog: "lockdown",           status: "loaded"   }
      - { repo: "aikaterna-cogs", cog: "lseen",              status: "loaded"   }
      - { repo: "PCXCogs",        cog: "maintenance",        status: "loaded"   }
      - { repo: "Laggrons-Cogs",  cog: "massrole",           status: "loaded"   }
      - { repo: "tl",             cog: "mentionhelp",        status: "loaded"   }
      - { repo: "flare-cogs",     cog: "moreadmin",          status: "loaded"   }
      - { repo: "brandons209",    cog: "mutes",              status: "loaded"   }
      - { repo: "tl",             cog: "mutesP",             status: "loaded"   }
      - { repo: "tl",             cog: "partycrash",         status: "loaded"   }
      - { repo: "Trusty-cogs",    cog: "reports",            status: "loaded"   }
      - { repo: "Dav-Cogs",       cog: "rolemanagement",     status: "loaded"   }
      - { repo: "Trusty-cogs",    cog: "roletools",          status: "loaded"   }
      - { repo: "Fixator10-Cogs", cog: "serverstats",        status: "loaded"   }
      - { repo: "PCXCogs",        cog: "streamroles",        status: "loaded"   }
      - { repo: "Trusty-cogs",    cog: "streams",            status: "loaded"   }
      - { repo: "flare-cogs",     cog: "targeter",           status: "loaded"   }
      - { repo: "tl",             cog: "ticketer",           status: "loaded"   }
      - { repo: "Laggrons-Cogs",  cog: "timerole",           status: "loaded"   }
      - { repo: "Trusty-cogs",    cog: "translate",          status: "loaded"   }
      - { repo: "Fixator10-Cogs", cog: "userlog",            status: "loaded"   }
      # ── UNLOADED (historical / optional) ────────────────────────────────────
      - { repo: "adventurerepo",  cog: "adventure",          status: "unloaded" }
      - { repo: "adventurerepo",  cog: "adventurealert",     status: "unloaded" }
      - { repo: "SauriCogs",      cog: "birthdays",          status: "unloaded" }
      - { repo: "Laggrons-Cogs",  cog: "captcha",            status: "unloaded" }
      - { repo: "jumperplugins",  cog: "casino",             status: "unloaded" }
      - { repo: "tl",             cog: "channelmanagementP", status: "unloaded" }
      - { repo: "legendv3",       cog: "clashroyaleclans",   status: "unloaded" }
      - { repo: "legendv3",       cog: "clashroyaleclansv2", status: "unloaded" }
      - { repo: "legendv3",       cog: "clashroyalestats",   status: "unloaded" }
      - { repo: "tl",             cog: "cleanupDEBUG",       status: "unloaded" }
      - { repo: "tl",             cog: "cleanupP",           status: "unloaded" }
      - { repo: "Fixator10-Cogs", cog: "commandchart",       status: "unloaded" }
      - { repo: "aikaterna-cogs", cog: "compliment",         status: "unloaded" }
      - { repo: "legendv3",       cog: "cresports",          status: "unloaded" }
      - { repo: "legendv3",       cog: "crmisc",             status: "unloaded" }
      - { repo: "legendv3",       cog: "crtoolsdb",          status: "unloaded" }
      - { repo: "tl",             cog: "crtoolsdbDEBUG",     status: "unloaded" }
      - { repo: "Fixator10-Cogs", cog: "datautils",          status: "unloaded" }
      - { repo: "tl",             cog: "embedinvite",        status: "unloaded" }
      - { repo: "legendv3",       cog: "fameldb",            status: "unloaded" }
      - { repo: "SauriCogs",      cog: "feedback",           status: "unloaded" }
      - { repo: "Trusty-cogs",    cog: "forward",            status: "unloaded" }
      - { repo: "FlameCogs",      cog: "giveaway",           status: "unloaded" }
      - { repo: "jumperplugins",  cog: "heist",              status: "unloaded" }
      - { repo: "Laggrons-Cogs",  cog: "instantcmd",         status: "unloaded" }
      - { repo: "Fixator10-Cogs", cog: "invites",            status: "unloaded" }
      - { repo: "tl",             cog: "jailed",             status: "unloaded" }
      - { repo: "tl",             cog: "jailP",              status: "unloaded" }
      - { repo: "Kennyshiwas",    cog: "joinmessage",        status: "unloaded" }
      - { repo: "Fixator10-Cogs", cog: "Leveler",            status: "unloaded" }
      - { repo: "tl",             cog: "levelerplus",        status: "unloaded" }
      - { repo: "tl",             cog: "listpermissions",    status: "unloaded" }
      - { repo: "tl",             cog: "MinecraftFactions",  status: "unloaded" }
      - { repo: "tl",             cog: "modP",               status: "unloaded" }
      - { repo: "flare-cogs",     cog: "modplus",            status: "unloaded" }
      - { repo: "tl",             cog: "MonthlyLeveler",     status: "unloaded" }
      - { repo: "jumperplugins",  cog: "race",               status: "unloaded" }
      - { repo: "tl",             cog: "recruitment",        status: "unloaded" }
      - { repo: "PCXCogs",        cog: "remindme",           status: "unloaded" }
      - { repo: "legendv3",       cog: "riverrace",          status: "unloaded" }
      - { repo: "brandons209",    cog: "roleplay",           status: "unloaded" }
      - { repo: "FlameCogs",      cog: "roulette",           status: "unloaded" }
      - { repo: "FlameCogs",      cog: "russianroulette",    status: "unloaded" }
      - { repo: "flare-cogs",     cog: "say",                status: "unloaded" }
      - { repo: "tl",             cog: "sbansync",           status: "unloaded" }
      - { repo: "Laggrons-Cogs",  cog: "scheduler",         status: "unloaded" }
      - { repo: "Dav-Cogs",       cog: "stickyroles",        status: "unloaded" }
      - { repo: "FlameCogs",      cog: "stocks",             status: "unloaded" }
      - { repo: "tl",             cog: "suggestion",         status: "unloaded" }
      - { repo: "tl",             cog: "supporter",          status: "unloaded" }
      - { repo: "aikaterna-cogs", cog: "timezone",           status: "unloaded" }
      - { repo: "jumperplugins",  cog: "trade",              status: "unloaded" }
      - { repo: "Trusty-cogs",    cog: "tweets",             status: "unloaded" }
      - { repo: "tl",             cog: "uniquename",         status: "unloaded" }
      - { repo: "PCXCogs",        cog: "updatechecker",      status: "unloaded" }
      - { repo: "tl",             cog: "warningsP",          status: "unloaded" }
      - { repo: "Trusty-cogs",    cog: "welcome",            status: "unloaded" }
      - { repo: "tl",             cog: "welcomecount",       status: "unloaded" }
      - { repo: "Kennyshiwas",    cog: "welcomer",           status: "unloaded" }

  tasks:

    - name: "REDBOT | Starting Red-DiscordBot installation..."
      ansible.builtin.debug:
        msg: "Installing Red-DiscordBot with {{ redbot_repos | length }} repos and {{ redbot_cogs | length }} cogs..."

    - name: Red-DiscordBot installation
      block:

        ########################################################################
        # STEP 1: System prerequisites
        ########################################################################

        - name: "REDBOT | Step 1/6 - Installing system prerequisites..."
          ansible.builtin.apt:
            name:
              - python3
              - python3-pip
              - python3-venv
              - python3-dev
              - git
              - build-essential
              - libssl-dev
              - libffi-dev
            state: present
            update_cache: yes

        ########################################################################
        # STEP 2: System user and directories
        ########################################################################

        - name: "REDBOT | Step 2/6 - Creating redbot system user..."
          ansible.builtin.user:
            name: "{{ redbot_user }}"
            home: "{{ redbot_home }}"
            shell: /bin/bash
            system: yes
            create_home: yes

        - name: Create Redbot directory structure
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ redbot_user }}"
            group: "{{ redbot_user }}"
            mode: "0755"
          loop:
            - "{{ redbot_home }}"
            - "{{ redbot_data }}"
            - "{{ redbot_home }}/.config"
            - "{{ redbot_home }}/.config/Red-DiscordBot"
            - "{{ redbot_data }}/cogs"
            - "{{ redbot_data }}/core"
            - "{{ redbot_data }}/cogs/Downloader"
            - "{{ redbot_data }}/cogs/Downloader/repos"
            - "{{ redbot_data }}/cogs/Downloader/packages"

        ########################################################################
        # STEP 3: Install Red-DiscordBot in a virtual environment
        ########################################################################

        - name: "REDBOT | Step 3/6 - Creating Python virtual environment..."
          ansible.builtin.pip:
            name:
              - pip
              - wheel
              - setuptools
            state: latest
            virtualenv: "{{ redbot_venv }}"
            virtualenv_command: python3 -m venv
          become_user: "{{ redbot_user }}"

        - name: "REDBOT | Installing Red-DiscordBot (this may take several minutes)..."
          ansible.builtin.pip:
            name: "Red-DiscordBot[postgres]"
            state: present
            virtualenv: "{{ redbot_venv }}"
          become_user: "{{ redbot_user }}"
          register: redbot_install_result

        ########################################################################
        # STEP 4: Instance configuration
        ########################################################################

        - name: "REDBOT | Step 4/6 - Writing instance configuration..."
          ansible.builtin.copy:
            dest: "{{ redbot_home }}/.config/Red-DiscordBot/config.json"
            owner: "{{ redbot_user }}"
            group: "{{ redbot_user }}"
            mode: "0600"
            content: |
              {
                "{{ redbot_instance }}": {
                  "DATA_PATH": "{{ redbot_data }}",
                  "COG_PATH": "{{ redbot_data }}/cogs",
                  "CORE_PATH": "{{ redbot_data }}/core",
                  "STORAGE_DETAILS": {},
                  "STORAGE_TYPE": "JSON"
                }
              }

        ########################################################################
        # STEP 5: Clone repos and install cogs via Python helper
        ########################################################################

        - name: "REDBOT | Step 5/6 - Writing cog setup helper script..."
          ansible.builtin.copy:
            dest: "{{ redbot_home }}/setup_cogs.py"
            owner: "{{ redbot_user }}"
            group: "{{ redbot_user }}"
            mode: "0755"
            content: |
              #!/usr/bin/env python3
              """
              Redbot TL Cog Inventory Setup
              Adds all repos and installs cogs from the TL cog inventory.
              Generated by Zoolandia ansible/roles/secret/redbot/site.yml
              """
              import asyncio
              import shutil
              import sys
              from pathlib import Path

              INSTANCE = sys.argv[1] if len(sys.argv) > 1 else "{{ redbot_instance }}"

              # Bootstrap Red data paths before importing anything else
              import redbot.core.data_manager as data_manager
              data_manager.load_basic_configuration(INSTANCE)

              from redbot.cogs.downloader.repo_manager import RepoManager

              REPOS = [
              {% for r in redbot_repos %}
                  ("{{ r.name }}", "{{ r.url }}"),
              {% endfor %}
              ]

              # (repo_name, cog_package_name, status)
              COGS = [
                  # === LOADED (were active in production) ===
              {% for c in redbot_cogs if c.status == 'loaded' %}
                  ("{{ c.repo }}", "{{ c.cog }}", "loaded"),
              {% endfor %}
                  # === UNLOADED (historical / optional) ===
              {% for c in redbot_cogs if c.status == 'unloaded' %}
                  ("{{ c.repo }}", "{{ c.cog }}", "unloaded"),
              {% endfor %}
              ]

              async def main():
                  errors  = []
                  skipped = []

                  rm = RepoManager()
                  await rm.initialize()

                  # Install path: where Downloader places cog packages
                  install_path = data_manager.cog_data_path(raw_name="Downloader") / "packages"
                  install_path.mkdir(parents=True, exist_ok=True)

                  # ── Add / clone repos ──────────────────────────────────────────
                  print(f"\n{'='*60}")
                  print(f"REPOS  ({len(REPOS)})")
                  print('='*60)

                  for name, url in REPOS:
                      if rm.get_repo(name) is not None:
                          print(f"  [=] {name:25s} (already cloned)")
                          continue
                      try:
                          await rm.add_repo(name=name, url=url, branch="HEAD")
                          print(f"  [+] {name}")
                      except Exception as exc:
                          print(f"  [!] {name}: {exc}")
                          errors.append(f"repo add {name}: {exc}")

                  # ── Install cog packages ───────────────────────────────────────
                  print(f"\n{'='*60}")
                  print(f"COGS   ({len(COGS)})")
                  print('='*60)

                  for repo_name, cog_name, status in COGS:
                      tag = "[ACTIVE]" if status == "loaded" else "[stored]"

                      repo = rm.get_repo(repo_name)
                      if repo is None:
                          print(f"  [!] {cog_name:25s} repo '{repo_name}' not found — skipping")
                          errors.append(f"cog {cog_name}: repo {repo_name} missing")
                          continue

                      dst = install_path / cog_name
                      if dst.exists():
                          print(f"  [=] {cog_name:25s} (already installed)")
                          continue

                      # Determine the source directory in the cloned repo.
                      # Try: exact name, then lowercase (e.g. "Leveler" -> "leveler").
                      repo_dir = getattr(repo, "folder_path", None) or \
                                 (data_manager.cog_data_path(raw_name="Downloader") / "repos" / repo_name)

                      src = None
                      for candidate in [cog_name, cog_name.lower()]:
                          p = Path(repo_dir) / candidate
                          if p.is_dir() and (p / "__init__.py").exists():
                              src = p
                              break

                      if src is None:
                          # Last resort: ask RepoManager for available cogs (reads info.json)
                          try:
                              available = await repo.available_cogs()
                              match = next(
                                  (c for c in available if c.name.lower() == cog_name.lower()),
                                  None
                              )
                              if match:
                                  src = getattr(match, "location", None) or \
                                        getattr(match, "_location", None)
                          except Exception:
                              pass

                      if src is None or not Path(src).exists():
                          print(f"  [?] {cog_name:25s} not found in {repo_name} — may need manual install")
                          skipped.append(f"{repo_name}/{cog_name}")
                          continue

                      try:
                          shutil.copytree(str(src), str(dst))
                          print(f"  [+] {cog_name:25s} {tag}")
                      except Exception as exc:
                          print(f"  [!] {cog_name:25s}: {exc}")
                          errors.append(f"cog {cog_name}: {exc}")

                  # ── Summary ───────────────────────────────────────────────────
                  print(f"\n{'='*60}")
                  total_issues = len(errors) + len(skipped)
                  if errors:
                      print(f"Errors ({len(errors)}):")
                      for e in errors:
                          print(f"  - {e}")
                  if skipped:
                      print(f"\nNot found ({len(skipped)}) — cog directory name may differ in repo:")
                      for s in skipped:
                          print(f"  - {s}")
                  if total_issues == 0:
                      print("All repos and cogs set up successfully!")
                  print(f"\nPackages: {install_path}")
                  print("Next    : Start the bot, then run  [p]load downloader  and  [p]load <cog>")

              asyncio.run(main())

        - name: "REDBOT | Running cog setup helper (clones {{ redbot_repos | length }} repos)..."
          ansible.builtin.command:
            cmd: "{{ redbot_venv }}/bin/python3 {{ redbot_home }}/setup_cogs.py {{ redbot_instance }}"
          become_user: "{{ redbot_user }}"
          environment:
            HOME: "{{ redbot_home }}"
          register: cog_setup_result
          changed_when: "'[+]' in cog_setup_result.stdout"

        - name: Show cog setup output
          ansible.builtin.debug:
            msg: "{{ cog_setup_result.stdout_lines }}"

        ########################################################################
        # STEP 6: Systemd service
        ########################################################################

        - name: "REDBOT | Step 6/6 - Installing systemd service..."
          ansible.builtin.copy:
            dest: /etc/systemd/system/redbot.service
            mode: "0644"
            content: |
              [Unit]
              Description=Red-DiscordBot ({{ redbot_instance }})
              After=network-online.target
              Wants=network-online.target

              [Service]
              Type=simple
              User={{ redbot_user }}
              WorkingDirectory={{ redbot_home }}
              ExecStart={{ redbot_venv }}/bin/redbot {{ redbot_instance }}
              Restart=on-failure
              RestartSec=15
              StandardOutput=journal
              StandardError=journal

              [Install]
              WantedBy=multi-user.target

        - name: Reload systemd daemon
          ansible.builtin.systemd:
            daemon_reload: yes

        ########################################################################
        # Verify
        ########################################################################

        - name: Verify Red-DiscordBot is installed
          ansible.builtin.command:
            cmd: "{{ redbot_venv }}/bin/redbot --version"
          become_user: "{{ redbot_user }}"
          environment:
            HOME: "{{ redbot_home }}"
          register: redbot_version
          changed_when: false

        ########################################################################
        # Success — help prompt
        ########################################################################

        - name: "REDBOT | Installation complete!"
          ansible.builtin.debug:
            msg: |
              ============================================================
               Red-DiscordBot — Installation Summary
              ============================================================

               Version  : {{ redbot_version.stdout | default('unknown') }}
               Instance : {{ redbot_instance }}
               User     : {{ redbot_user }}
               Venv     : {{ redbot_venv }}
               Data     : {{ redbot_data }}

              ------------------------------------------------------------
               What this playbook did
              ------------------------------------------------------------

               Step 1 — System prerequisites
                 Installed: python3, python3-venv, git, build-essential,
                 libssl-dev, libffi-dev, python3-dev

               Step 2 — System user & directories
                 Created user '{{ redbot_user }}' with home {{ redbot_home }}
                 Created data, cogs, core, and Downloader directories

               Step 3 — Red-DiscordBot install
                 Installed Red-DiscordBot into a Python venv at:
                   {{ redbot_venv }}

               Step 4 — Instance configuration
                 Wrote instance config (JSON backend) to:
                   {{ redbot_home }}/.config/Red-DiscordBot/config.json

               Step 5 — Repos cloned & cogs staged
                 Cloned {{ redbot_repos | length }} repos via RepoManager into:
                   {{ redbot_data }}/cogs/Downloader/repos/
                 Staged {{ redbot_cogs | length }} cog packages into:
                   {{ redbot_data }}/cogs/Downloader/packages/
                     - {{ redbot_cogs | selectattr('status','eq','loaded')   | list | length }} ACTIVE  cogs (were loaded in production)
                     - {{ redbot_cogs | selectattr('status','eq','unloaded') | list | length }} STORED  cogs (historical / optional)

               Step 6 — Systemd service
                 Installed: /etc/systemd/system/redbot.service
                 (not enabled — see manual steps below)

              ------------------------------------------------------------
               Manual steps required
              ------------------------------------------------------------

               1. Start the bot and enter your Discord bot token:
                    sudo -u {{ redbot_user }} {{ redbot_venv }}/bin/redbot {{ redbot_instance }}

               2. In Discord, send these commands as the bot owner:
                    [p]load downloader          <- enable the cog manager
                    [p]repos list               <- confirm all repos are present
                    [p]load <cog_name>          <- activate each cog you want

                  Active cogs to load (were live in production):
                    activitylog, antispam, cooldown, editor, embedmaker,
                    exporttree, extendedmodlog, infochannel, lockdown, lseen,
                    maintenance, massrole, mentionhelp, moreadmin, mutes,
                    mutesP, partycrash, reports, rolemanagement, roletools,
                    serverstats, streamroles, streams, targeter, ticketer,
                    timerole, translate, userlog

               3. Enable autostart once the bot is confirmed working:
                    systemctl enable --now redbot

              ------------------------------------------------------------
               Useful commands
              ------------------------------------------------------------

               Start/stop the bot:
                 systemctl start redbot
                 systemctl stop  redbot

               View live logs:
                 journalctl -u redbot -f

               Re-run repo/cog setup (e.g. after adding new cogs to the CSV):
                 sudo -u {{ redbot_user }} \
                   {{ redbot_venv }}/bin/python3 {{ redbot_home }}/setup_cogs.py {{ redbot_instance }}

               Manually run the bot (interactive, for first-time token entry):
                 sudo -u {{ redbot_user }} {{ redbot_venv }}/bin/redbot {{ redbot_instance }}

              ============================================================

        - name: "REDBOT | Press Enter to continue..."
          ansible.builtin.pause:
            prompt: "Review the summary above, then press Enter to exit"

      rescue:
        - name: "REDBOT | Installation failed"
          ansible.builtin.debug:
            msg: |
              Red-DiscordBot installation failed.

              Error: {{ ansible_failed_result.msg | default('Unknown error') }}

              Troubleshooting:
                - Check Python version:  python3 --version  (requires 3.8+)
                - Check pip/venv:        python3 -m venv --help
                - Check git:             git --version
                - Re-run with verbosity: ansible-playbook site.yml -v
