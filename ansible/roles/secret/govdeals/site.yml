---
################################################################################
# Secret Project: GovDeals Monitoring System
# Purpose: Deploy GovDeals auction monitoring system to /opt/govdeals
#
# Usage: Run via Zoolandia Secret Projects menu
#
# Files source: ansible/roles/secret/files/GovDeals/
################################################################################

- name: Deploy GovDeals Monitoring System
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  vars:
    govdeals_src: "{{ playbook_dir }}/../../files/GovDeals"
    govdeals_dest: /opt/govdeals

  tasks:
    - name: Install Python dependencies
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes

    - name: Create /opt/govdeals directory
      ansible.builtin.file:
        path: "{{ govdeals_dest }}"
        state: directory
        mode: '0755'

    - name: Copy GovDeals application files
      ansible.builtin.copy:
        src: "{{ govdeals_src }}/"
        dest: "{{ govdeals_dest }}/"
        mode: preserve

    - name: Install Python requirements
      ansible.builtin.pip:
        requirements: "{{ govdeals_dest }}/config/requirements.txt"
        state: present
        extra_args: --break-system-packages

    - name: Display post-install instructions
      ansible.builtin.debug:
        msg: |
          GovDeals deployed to {{ govdeals_dest }}

          Next steps:
            1. Edit {{ govdeals_dest }}/config/config.json to configure alerts
            2. cd {{ govdeals_dest }} && python3 src/monitor.py --add
            3. python3 src/dashboard.py
