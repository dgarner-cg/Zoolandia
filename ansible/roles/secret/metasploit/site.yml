---
################################################################################
# Secret Project: Metasploit Framework
# Purpose: Install Metasploit Framework via official Rapid7 apt repository
#
# Usage: Run via Zoolandia Secret Projects menu
#
# Extra vars (optional):
#   msf_init_db=true     Run msfdb init after install (requires PostgreSQL)
################################################################################

- name: Install Metasploit Framework
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  vars:
    msf_apt_key_url: "https://apt.metasploit.com/metasploit-framework.gpg.key"
    msf_apt_repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/metasploit-framework.gpg] https://apt.metasploit.com/ jessie main"
    msf_keyring_path: "/usr/share/keyrings/metasploit-framework.gpg"
    msf_gpg_key_tmp: "/tmp/metasploit-framework.gpg.key"
    msf_init_db: false

  tasks:

    - name: "🎯 METASPLOIT | Installing Metasploit Framework"
      ansible.builtin.debug:
        msg: "Installing Metasploit Framework via official Rapid7 apt repository..."

    - name: Metasploit Framework installation
      block:

        ########################################################################
        # STEP 1: Prerequisites
        ########################################################################

        - name: "🔄 METASPLOIT | Step 1/5 - Installing prerequisites..."
          ansible.builtin.apt:
            name:
              - gnupg
              - curl
              - ca-certificates
            state: present
            update_cache: yes

        ########################################################################
        # STEP 2: Download GPG key (secure - no curl|bash)
        ########################################################################

        - name: "🔄 METASPLOIT | Step 2/5 - Downloading Rapid7 GPG key..."
          ansible.builtin.get_url:
            url: "{{ msf_apt_key_url }}"
            dest: "{{ msf_gpg_key_tmp }}"
            mode: "0644"
            timeout: 30

        ########################################################################
        # STEP 3: Import key to keyring
        ########################################################################

        - name: "🔄 METASPLOIT | Step 3/5 - Adding GPG key to keyring..."
          ansible.builtin.shell:
            cmd: "gpg --dearmor < {{ msf_gpg_key_tmp }} > {{ msf_keyring_path }}"
            creates: "{{ msf_keyring_path }}"

        - name: Set keyring permissions
          ansible.builtin.file:
            path: "{{ msf_keyring_path }}"
            owner: root
            group: root
            mode: "0644"

        ########################################################################
        # STEP 4: Add Rapid7 apt repository
        ########################################################################

        - name: "🔄 METASPLOIT | Step 4/5 - Adding Rapid7 apt repository..."
          ansible.builtin.apt_repository:
            repo: "{{ msf_apt_repo }}"
            state: present
            filename: metasploit-framework

        ########################################################################
        # STEP 5: Install package
        ########################################################################

        - name: "📦 METASPLOIT | Step 5/5 - Installing metasploit-framework..."
          ansible.builtin.apt:
            name: metasploit-framework
            state: present
            update_cache: yes
          register: msf_install_result

        ########################################################################
        # Verify
        ########################################################################

        - name: "🔍 METASPLOIT | Verifying installation..."
          ansible.builtin.command: which msfconsole
          register: msf_verify
          changed_when: false
          failed_when: msf_verify.rc != 0

        - name: Get installed version
          ansible.builtin.command: msfconsole --version
          register: msf_version
          changed_when: false
          ignore_errors: yes

        ########################################################################
        # Optional: Initialize database
        ########################################################################

        - name: "🗄️  METASPLOIT | Initializing Metasploit database..."
          ansible.builtin.command: msfdb init
          register: msf_db_init
          changed_when: "'created' in msf_db_init.stdout | lower or 'initialized' in msf_db_init.stdout | lower"
          ignore_errors: yes
          when: msf_init_db | bool

        ########################################################################
        # Success
        ########################################################################

        - name: "✅ METASPLOIT | Installation successful!"
          ansible.builtin.debug:
            msg: |
              ✅ Metasploit Framework installed successfully!

              Binary   : {{ msf_verify.stdout }}
              Version  : {{ msf_version.stdout | default('unknown') }}

              ℹ️  Getting started:
                msfconsole              — launch the console
                msfdb init              — initialize PostgreSQL database
                msfupdate               — update to latest version

              ⚠️  Legal reminder:
                Only use against systems you own or have explicit written
                permission to test.

      rescue:
        - name: "❌ METASPLOIT | Installation failed"
          ansible.builtin.debug:
            msg: |
              ❌ Metasploit Framework installation failed

              Error: {{ ansible_failed_result.msg | default('Unknown error') }}

              Troubleshooting:
                - Check network connectivity to apt.metasploit.com
                - Verify apt repository access
                - Manually try: apt update && apt install metasploit-framework

      always:
        - name: Clean up GPG key download
          ansible.builtin.file:
            path: "{{ msf_gpg_key_tmp }}"
            state: absent
