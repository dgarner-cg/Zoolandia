---
- name: Install n8n
  block:
    - name: Check if n8n is already running
      shell: "docker ps -a | grep n8n"
      register: n8n_check
      ignore_errors: true
      failed_when: false

    - name: Create n8n data directory
      file:
        path: /home/dgarner/.n8n
        state: directory
        owner: dgarner
        group: dgarner
        mode: '0755'
      when: n8n_check.rc != 0
      ignore_errors: true

    - name: Deploy n8n container
      shell: |
        docker run -d \
          --name n8n \
          --restart=always \
          -p 5678:5678 \
          -e N8N_HOST=localhost \
          -e N8N_PORT=5678 \
          -e N8N_PROTOCOL=http \
          -e WEBHOOK_URL=http://localhost:5678/ \
          -v /home/dgarner/.n8n:/home/node/.n8n \
          n8nio/n8n:latest
      when: n8n_check.rc != 0
      ignore_errors: true
      register: n8n_install

- name: Add to failures list - n8n install
  set_fact:
    failures: "{{ failures + ['n8n installation failed'] }}"
  when: n8n_install is defined and n8n_install is mapping and n8n_install.failed | default(false)

- name: Print reminder for n8n setup
  debug:
    msg: "n8n installed. Access it at http://localhost:5678 - You'll need to create an account on first access."
  when: n8n_check.rc != 0
