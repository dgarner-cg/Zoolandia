---
- name: Install Docker and Docker Compose
  block:
    - name: Check if Docker is installed
      shell: "command -v docker"
      register: docker_check
      ignore_errors: true
      failed_when: false

    - name: Install Docker prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      when: docker_check.rc != 0
      ignore_errors: true

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      when: docker_check.rc != 0
      ignore_errors: true

    - name: Add Docker's official GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      when: docker_check.rc != 0
      ignore_errors: true
      register: docker_gpg

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      when: docker_check.rc != 0
      ignore_errors: true
      register: docker_repo

    - name: Update apt cache for Docker
      apt:
        update_cache: true
      when: docker_check.rc != 0
      ignore_errors: true

    - name: Install Docker Engine and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: docker_check.rc != 0
      ignore_errors: true
      register: docker_install

    - name: Add user to docker group
      user:
        name: dgarner
        groups: docker
        append: true
      when: docker_check.rc != 0
      ignore_errors: true

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true
      when: docker_check.rc != 0
      ignore_errors: true

- name: Add to failures list - Docker install
  set_fact:
    failures: "{{ failures + ['Docker installation failed'] }}"
  when: >
    (docker_install is defined and docker_install is mapping and docker_install.failed | default(false)) or
    (docker_gpg is defined and docker_gpg is mapping and docker_gpg.failed | default(false)) or
    (docker_repo is defined and docker_repo is mapping and docker_repo.failed | default(false))
