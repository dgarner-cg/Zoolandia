<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <h2>Icon Generator for AI Chat Exporter</h2>
  <p>Open this file in a browser to generate the required PNG icons.</p>
  <button onclick="generateIcons()">Generate Icons</button>
  <div id="output"></div>

  <script>
    async function generateIcons() {
      const sizes = [16, 48, 128];
      const svg = `<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="128" height="128" rx="24" fill="url(#gradient)"/>
        <path d="M84 52L64 72L44 52" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M64 40V72" stroke="white" stroke-width="8" stroke-linecap="round"/>
        <path d="M36 76V88C36 91.3137 38.6863 94 42 94H86C89.3137 94 92 91.3137 92 88V76" stroke="white" stroke-width="8" stroke-linecap="round"/>
        <defs>
          <linearGradient id="gradient" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
            <stop stop-color="#667eea"/>
            <stop offset="1" stop-color="#764ba2"/>
          </linearGradient>
        </defs>
      </svg>`;

      const output = document.getElementById('output');
      output.innerHTML = '<p>Generating icons...</p>';

      for (const size of sizes) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        const img = new Image();
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);

        await new Promise((resolve) => {
          img.onload = () => {
            ctx.drawImage(img, 0, 0, size, size);
            canvas.toBlob((blob) => {
              const link = document.createElement('a');
              link.download = `icon${size}.png`;
              link.href = URL.createObjectURL(blob);
              link.click();
              resolve();
            });
          };
          img.src = url;
        });

        URL.revokeObjectURL(url);
      }

      output.innerHTML = '<p style="color: green;">Icons generated! Check your downloads folder for icon16.png, icon48.png, and icon128.png. Move them to the icons/ folder.</p>';
    }
  </script>
</body>
</html>
