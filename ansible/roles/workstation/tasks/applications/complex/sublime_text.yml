---
################################################################################
# Sublime Text Installation
# Method: Vendor APT Repository
#
# SECURITY:
#   Uses GPG-signed vendor repository (not curl|bash)
#
# Execute:
#   ansible-playbook workstations.yml --tags "sublime-text"
#
################################################################################

- name: "{{ user_experience.emoji_package | default('📦') }} SUBLIME TEXT | Installing Sublime Text..."
  ansible.builtin.debug:
    msg: "Installing Sublime Text via vendor APT repository..."
  tags: ['applications', 'sublime-text', 'editor', 'complex']

- name: Sublime Text installation
  block:
    - name: "{{ user_experience.emoji_working | default('🔄') }} SUBLIME TEXT | Step 1/4 - Downloading GPG key..."
      ansible.builtin.get_url:
        url: "https://download.sublimetext.com/sublimehq-pub.gpg"
        dest: /usr/share/keyrings/sublimehq-pub.asc
        mode: '0644'
      register: sublime_gpg_result

    - name: "{{ user_experience.emoji_working | default('🔄') }} SUBLIME TEXT | Step 2/4 - Dearmoring GPG key..."
      ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/sublimehq-pub.gpg /usr/share/keyrings/sublimehq-pub.asc
      args:
        creates: /usr/share/keyrings/sublimehq-pub.gpg

    - name: "{{ user_experience.emoji_working | default('🔄') }} SUBLIME TEXT | Step 3/4 - Adding APT repository..."
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/sublimehq-pub.gpg] https://download.sublimetext.com/ apt/stable/"
        state: present
        filename: sublime-text

    - name: "{{ user_experience.emoji_working | default('🔄') }} SUBLIME TEXT | Step 4/4 - Installing package..."
      ansible.builtin.apt:
        name:
          - sublime-text
        state: present
        update_cache: yes
      register: sublime_install_result

    - name: "{{ user_experience.emoji_success | default('✅') }} SUBLIME TEXT | Installation successful!"
      ansible.builtin.debug:
        msg: "Sublime Text installed successfully!"

    - name: Log Sublime Text installation success
      ansible.builtin.lineinfile:
        path: "{{ logging.audit_trail }}"
        line: "[{{ ansible_date_time.iso8601 }}] SUBLIME TEXT: Successfully installed via vendor APT repository"
        create: yes
        mode: '0644'
      when: logging.enabled | default(true)

  rescue:
    - name: "{{ user_experience.emoji_failure | default('❌') }} SUBLIME TEXT | Installation failed"
      ansible.builtin.debug:
        msg: |
          {{ user_experience.emoji_failure | default('❌') }} Sublime Text installation failed
          Error: {{ ansible_failed_result.msg | default('Unknown error') }}

    - name: Log Sublime Text installation failure
      ansible.builtin.lineinfile:
        path: "{{ logging.audit_trail }}"
        line: "[{{ ansible_date_time.iso8601 }}] SUBLIME TEXT: Installation FAILED - {{ ansible_failed_result.msg | default('Unknown error') }}"
        create: yes
        mode: '0644'
      when: logging.enabled | default(true)

    - name: Add to failures list
      ansible.builtin.set_fact:
        workstation_failures: "{{ workstation_failures | default([]) + ['Sublime Text: ' + (ansible_failed_result.msg | default('Installation failed'))] }}"

  tags: ['applications', 'sublime-text', 'editor', 'complex']
