---
################################################################################
# cAdvisor Deployment
################################################################################

- name: cAdvisor deployment
  block:
    - name: Add cAdvisor compose file to Docker stack
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../includes/docker/starter.yml"
        insertbefore: "# SERVICE-PLACEHOLDER-DO-NOT-DELETE"
        line: "  - compose/cadvisor.yml"
        state: present

    - name: Deploy cAdvisor container
      ansible.builtin.command: docker compose -f "{{ playbook_dir }}/../includes/docker/starter.yml" up -d cadvisor
      register: cadvisor_deploy
      changed_when: "'Started' in cadvisor_deploy.stdout or 'Created' in cadvisor_deploy.stdout"
      ignore_errors: yes

    - name: Verify cAdvisor container is running
      ansible.builtin.command: docker ps --filter "name=cadvisor" --format "{{ '{{' }}.Status{{ '}}' }}"
      register: cadvisor_status
      changed_when: false
      failed_when: cadvisor_status.stdout == ""

  rescue:
    - name: Track cAdvisor deployment failure
      ansible.builtin.set_fact:
        monitoring_failures: "{{ monitoring_failures | default([]) + ['cAdvisor: ' + (ansible_failed_result.msg | default('Deployment failed'))] }}"

  tags: ['monitoring', 'cadvisor']
