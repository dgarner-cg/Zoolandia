---
################################################################################
# InfluxDB Deployment
################################################################################

- name: InfluxDB deployment
  block:
    - name: Create InfluxDB appdata directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ docker_dir }}/appdata/influxdb2/config"
        - "{{ docker_dir }}/appdata/influxdb2/db"

    - name: Add InfluxDB compose file to Docker stack
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../includes/docker/starter.yml"
        insertbefore: "# SERVICE-PLACEHOLDER-DO-NOT-DELETE"
        line: "  - compose/influxdb.yml"
        state: present

    - name: Deploy InfluxDB container
      ansible.builtin.command: docker compose -f "{{ playbook_dir }}/../includes/docker/starter.yml" up -d influxdb
      register: influxdb_deploy
      changed_when: "'Started' in influxdb_deploy.stdout or 'Created' in influxdb_deploy.stdout"
      ignore_errors: yes

    - name: Verify InfluxDB container is running
      ansible.builtin.command: docker ps --filter "name=influxdb" --format "{{ '{{' }}.Status{{ '}}' }}"
      register: influxdb_status
      changed_when: false
      failed_when: influxdb_status.stdout == ""

  rescue:
    - name: Track InfluxDB deployment failure
      ansible.builtin.set_fact:
        monitoring_failures: "{{ monitoring_failures | default([]) + ['InfluxDB: ' + (ansible_failed_result.msg | default('Deployment failed'))] }}"

  tags: ['monitoring', 'influxdb']
