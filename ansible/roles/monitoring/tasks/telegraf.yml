---
################################################################################
# Telegraf Deployment
################################################################################

- name: Telegraf deployment
  block:
    - name: Create Telegraf appdata directory
      ansible.builtin.file:
        path: "{{ docker_dir }}/appdata/telegraf"
        state: directory
        mode: '0755'

    - name: Template Telegraf configuration
      ansible.builtin.template:
        src: telegraf.conf.j2
        dest: "{{ docker_dir }}/appdata/telegraf/telegraf.conf"
        mode: '0644'
      notify: restart telegraf

    - name: Add Telegraf compose file to Docker stack
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../includes/docker/starter.yml"
        insertbefore: "# SERVICE-PLACEHOLDER-DO-NOT-DELETE"
        line: "  - compose/telegraf.yml"
        state: present

    - name: Deploy Telegraf container
      ansible.builtin.command: docker compose -f "{{ playbook_dir }}/../includes/docker/starter.yml" up -d telegraf
      register: telegraf_deploy
      changed_when: "'Started' in telegraf_deploy.stdout or 'Created' in telegraf_deploy.stdout"
      ignore_errors: yes

    - name: Verify Telegraf container is running
      ansible.builtin.command: docker ps --filter "name=telegraf" --format "{{ '{{' }}.Status{{ '}}' }}"
      register: telegraf_status
      changed_when: false
      failed_when: telegraf_status.stdout == ""

  rescue:
    - name: Track Telegraf deployment failure
      ansible.builtin.set_fact:
        monitoring_failures: "{{ monitoring_failures | default([]) + ['Telegraf: ' + (ansible_failed_result.msg | default('Deployment failed'))] }}"

  tags: ['monitoring', 'telegraf']
