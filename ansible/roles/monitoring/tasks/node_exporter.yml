---
################################################################################
# Node Exporter Deployment
################################################################################

- name: Node Exporter deployment
  block:
    - name: Add Node Exporter compose file to Docker stack
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../includes/docker/starter.yml"
        insertbefore: "# SERVICE-PLACEHOLDER-DO-NOT-DELETE"
        line: "  - compose/node-exporter.yml"
        state: present

    - name: Deploy Node Exporter container
      ansible.builtin.command: docker compose -f "{{ playbook_dir }}/../includes/docker/starter.yml" up -d node-exporter
      register: node_exporter_deploy
      changed_when: "'Started' in node_exporter_deploy.stdout or 'Created' in node_exporter_deploy.stdout"
      ignore_errors: yes

    - name: Verify Node Exporter container is running
      ansible.builtin.command: docker ps --filter "name=node-exporter" --format "{{ '{{' }}.Status{{ '}}' }}"
      register: node_exporter_status
      changed_when: false
      failed_when: node_exporter_status.stdout == ""

  rescue:
    - name: Track Node Exporter deployment failure
      ansible.builtin.set_fact:
        monitoring_failures: "{{ monitoring_failures | default([]) + ['Node Exporter: ' + (ansible_failed_result.msg | default('Deployment failed'))] }}"

  tags: ['monitoring', 'node-exporter']
