version: "3"
services:
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - /data/grafana:/var/lib/grafana
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - /data/prometheus:/prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - /data/alertmanager:/alertmanager
    restart: unless-stopped
