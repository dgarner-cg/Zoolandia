- name: Pull images
  community.docker.docker_image:
    name: jellyfin/jellyfin
    source: pull

- name: Ensure stack running
  community.docker.docker_compose:
    project_src: /opt/media
    state: present

- name: Restart failed containers
  community.docker.docker_container:
    name: "{{ item }}"
    state: started
  loop:
    - grafana
    - prometheus
