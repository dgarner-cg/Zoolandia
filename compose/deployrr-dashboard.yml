services:
  # Zoolandia Dashboard - Homepage based Dashboard for Zoolandia
  zoolandia-dashboard:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: zoolandia-dashboard
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["apps", "all"]
    networks:
      - default
    ports:
      - "${ZOOLANDIA_DASHBOARD_PORT:-3010}:3000"
    volumes:
      - $DOCKERDIR/appdata/zoolandia-dashboard/config:/app/config
      - $DOCKERDIR/appdata/zoolandia-dashboard/images:/app/public/images
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
      HOMEPAGE_ALLOWED_HOSTS: "localhost:${ZOOLANDIA_DASHBOARD_PORT:-3010},127.0.0.1:${ZOOLANDIA_DASHBOARD_PORT:-3010},0.0.0.0:${ZOOLANDIA_DASHBOARD_PORT:-3010},${SERVER_IP:-localhost}:${ZOOLANDIA_DASHBOARD_PORT:-3010}"
    # DOCKER-LABELS-PLACEHOLDER

networks:
  default:
    driver: bridge